databaseChangeLog:
  - changeSet:
      id: 001
      author: dev
      changes:
        - createTable:
            tableName: rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: product_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false
                    defaultValueBoolean: true
