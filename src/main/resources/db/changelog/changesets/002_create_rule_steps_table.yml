databaseChangeLog:
  - changeSet:
      id: 002
      author: dev
      changes:
        - createTable:
            tableName: rule_query_steps
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rule_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rule_query_steps_rule
              - column:
                  name: step_order
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: query_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: query_value
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: operator
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
